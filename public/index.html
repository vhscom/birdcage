<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>birdcage</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#09090f;
  --surface:rgba(255,255,255,0.03);
  --surface-hover:rgba(255,255,255,0.055);
  --border:rgba(255,255,255,0.06);
  --border-focus:rgba(99,140,255,0.45);
  --text:#e4e4e7;
  --text-dim:#a1a1aa;
  --text-muted:#52525b;
  --primary:#638cff;
  --primary-hover:#4f75eb;
  --success:#4ade80;
  --error:#f87171;
  --link:#80aaff;
}

body{
  font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:2rem 1rem;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ---- Animated background blobs ---- */

.bg-anim{
  position:fixed;inset:0;z-index:0;
  overflow:hidden;pointer-events:none;
}

.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  will-change:transform;
  mix-blend-mode:screen;
}

.blob-1{
  width:650px;height:650px;
  background:radial-gradient(circle,rgba(59,130,246,0.35) 0%,transparent 70%);
  top:-20%;left:-8%;
  animation:drift1 18s ease-in-out infinite;
}
.blob-2{
  width:550px;height:550px;
  background:radial-gradient(circle,rgba(139,92,246,0.30) 0%,transparent 70%);
  bottom:-15%;right:-10%;
  animation:drift2 24s ease-in-out infinite;
}
.blob-3{
  width:420px;height:420px;
  background:radial-gradient(circle,rgba(6,182,212,0.22) 0%,transparent 70%);
  top:38%;left:50%;
  animation:drift3 21s ease-in-out infinite;
}

@keyframes drift1{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(12vw,6vh) scale(1.08)}
  50%{transform:translate(4vw,14vh) scale(0.95)}
  75%{transform:translate(-6vw,8vh) scale(1.04)}
}
@keyframes drift2{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(-10vw,-8vh) scale(1.12)}
  50%{transform:translate(-4vw,-16vh) scale(0.90)}
  75%{transform:translate(8vw,-6vh) scale(1.06)}
}
@keyframes drift3{
  0%,100%{transform:translate(-50%,0) scale(1)}
  25%{transform:translate(-42%,6vh) scale(1.10)}
  50%{transform:translate(-58%,-4vh) scale(0.92)}
  75%{transform:translate(-46%,-8vh) scale(1.05)}
}

/* Respect reduced-motion: kill animation entirely */
@media(prefers-reduced-motion:reduce){
  .blob{animation:none !important;transition:none !important}
}

/* Dashboard mode: subdued background */
body.settled .blob{
  animation-duration:90s !important;
  opacity:0.35 !important;
  transition:opacity 1.2s ease, animation-duration 0s;
}
@media(prefers-reduced-motion:reduce){
  body.settled .blob{animation:none !important;opacity:0.25 !important}
}

/* ---- Layout ---- */

#app{
  width:100%;max-width:400px;
  margin-top:max(8vh,2rem);
  position:relative;z-index:1;
}

/* ---- Typography ---- */

.brand{
  font-size:1.625rem;
  font-weight:700;
  letter-spacing:-0.03em;
  color:#fff;
  margin-bottom:0.375rem;
}

.tagline{
  font-size:0.9375rem;
  color:var(--text-dim);
  line-height:1.55;
  margin-bottom:1.75rem;
}

h2{
  font-size:0.6875rem;
  font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin:2rem 0 0.75rem;
}

/* ---- Forms ---- */

label{
  display:block;
  font-size:0.8125rem;
  font-weight:500;
  color:var(--text-dim);
  margin-bottom:0.375rem;
}

input[type="email"],
input[type="password"],
input[type="text"]{
  width:100%;
  padding:0.625rem 0.875rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:0.9375rem;
  font-family:inherit;
  margin-bottom:0.875rem;
  outline:none;
  transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
}

input:focus{
  border-color:var(--border-focus);
  background:var(--surface-hover);
  box-shadow:0 0 0 3px rgba(99,140,255,0.08);
}

input::placeholder{color:var(--text-muted)}

/* ---- Buttons ---- */

.btn{
  display:block;width:100%;
  padding:0.6875rem;
  border:none;border-radius:10px;
  font-size:0.9375rem;font-weight:500;
  font-family:inherit;
  cursor:pointer;
  transition:background 0.15s,transform 0.1s,box-shadow 0.15s;
}

.btn:active{transform:scale(0.985)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

.btn-primary{
  background:var(--primary);color:#fff;
  box-shadow:0 1px 3px rgba(99,140,255,0.18);
}
.btn-primary:hover{background:var(--primary-hover);box-shadow:0 2px 8px rgba(99,140,255,0.22)}

.btn-ghost{
  background:var(--surface);
  color:var(--text-dim);
  border:1px solid var(--border);
}
.btn-ghost:hover{
  background:var(--surface-hover);
  color:var(--text);
}

/* ---- Messages ---- */

.msg{font-size:0.8125rem;margin-top:0.625rem;min-height:1.25rem}
.msg.error{color:var(--error)}
.msg.ok{color:var(--success)}

/* ---- Card ---- */

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:0.875rem 1.125rem;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}

.status-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0.5rem 0;
}

.status-row+.status-row{border-top:1px solid rgba(255,255,255,0.04)}

.status-label{color:var(--text-muted);font-size:0.8125rem}
.status-value{font-size:0.8125rem;font-weight:600}
.status-value.online{color:var(--success)}
.status-value.offline{color:var(--error)}
.status-value.unknown{color:var(--text-muted)}

/* ---- Links ---- */

a{color:var(--link);text-decoration:none;font-weight:500}
a:hover{text-decoration:underline}

.claw-link{
  display:inline-flex;align-items:center;gap:0.375rem;
  font-size:0.9375rem;margin-top:0.75rem;
  transition:gap 0.2s ease;
}
.claw-link:hover{gap:0.625rem;text-decoration:none}
.claw-link .arrow{
  display:inline-block;
  transition:transform 0.2s ease;
}
.claw-link:hover .arrow{transform:translateX(2px)}

/* ---- Utility ---- */

.hidden{display:none}
.pow-info{font-size:0.8125rem;color:var(--text-muted);margin-top:0.625rem}
.divider{height:1px;background:var(--border);margin:1.5rem 0}
.gap{height:0.75rem}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-anim" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div id="app">

<!-- Loading -->
<div id="loading-view">
  <div class="brand">birdcage</div>
  <p class="tagline">Loading&hellip;</p>
</div>

<!-- Register -->
<div id="register-view" class="hidden">
  <div class="brand">birdcage</div>
  <p class="tagline">Create your account to get started.</p>
  <form id="register-form">
    <div id="reg-token-field" class="hidden">
      <label for="reg-token">Registration token</label>
      <input type="text" id="reg-token" name="registrationToken" required autocomplete="off">
    </div>
    <label for="reg-email">Email</label>
    <input type="email" id="reg-email" name="email" required autocomplete="email">
    <label for="reg-password">Password</label>
    <input type="password" id="reg-password" name="password" required autocomplete="new-password" minlength="8">
    <button type="submit" class="btn btn-primary">Create account</button>
  </form>
  <div id="register-msg" class="msg"></div>
</div>

<!-- Login -->
<div id="login-view" class="hidden">
  <div class="brand">birdcage</div>
  <p class="tagline">Sign in to access your claw.</p>
  <form id="login-form">
    <label for="login-email">Email</label>
    <input type="email" id="login-email" name="email" required autocomplete="email">
    <label for="login-password">Password</label>
    <input type="password" id="login-password" name="password" required autocomplete="current-password">
    <button type="submit" class="btn btn-primary">Sign in</button>
  </form>
  <div id="login-msg" class="msg"></div>
  <div id="pow-status" class="pow-info hidden">Solving proof-of-work challenge&hellip;</div>
</div>

<!-- Dashboard -->
<div id="dashboard-view" class="hidden">
  <div class="brand">birdcage</div>

  <div class="card">
    <div class="status-row">
      <span class="status-label">Gateway</span>
      <span id="gateway-status" class="status-value unknown">checking</span>
    </div>
    <div class="status-row">
      <span class="status-label">Account</span>
      <span id="user-email" class="status-value"></span>
    </div>
  </div>

  <a id="claw-link" class="claw-link" href="/control/">Open control panel <span class="arrow" aria-hidden="true">&rarr;</span></a>

  <h2>Password</h2>
  <form id="password-form">
    <input type="password" name="currentPassword" placeholder="Current password" required autocomplete="current-password">
    <input type="password" name="newPassword" placeholder="New password" required autocomplete="new-password" minlength="8">
    <button type="submit" class="btn btn-ghost">Change password</button>
  </form>
  <div id="password-msg" class="msg"></div>

  <div class="divider"></div>
  <button id="logout-btn" class="btn btn-ghost">Sign out</button>
</div>

</div>

<script nonce="__CSP_NONCE__">
(function(){
const $ = s => document.querySelector(s);
const show = id => {
  document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
  $(id).classList.remove('hidden');
};

async function api(method, path, body) {
  const opts = { method, headers: { 'Accept': 'application/json' } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  return { ok: r.ok, status: r.status, data };
}

// --- PoW solver ---
async function solvePoW(nonce, difficulty) {
  const prefix = '0'.repeat(difficulty);
  const enc = new TextEncoder();
  for (let i = 0; ; i++) {
    const solution = i.toString(16);
    const buf = enc.encode(nonce + solution);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hex.startsWith(prefix)) return solution;
  }
}

// --- Background animation control ---
function settleBackground() {
  document.body.classList.add('settled');
}

function unsettleBackground() {
  document.body.classList.remove('settled');
}

// --- Init ---
async function init() {
  const me = await api('GET', '/account/me');
  if (me.ok) {
    showDashboard(me.data);
    return;
  }
  const st = await api('GET', '/auth/status');
  if (st.ok && !st.data.registered) {
    if (st.data.requiresToken) {
      $('#reg-token-field').classList.remove('hidden');
    }
    show('#register-view');
  } else {
    show('#login-view');
  }
}

// --- Register ---
$('#register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = $('#register-msg');
  msg.textContent = '';
  msg.className = 'msg';
  const email = $('#reg-email').value;
  const password = $('#reg-password').value;
  const body = { email, password };
  const token = $('#reg-token').value;
  if (token) body.registrationToken = token;
  const r = await api('POST', '/auth/register', body);
  if (r.ok || r.data.success) {
    msg.textContent = 'Account created. Signing in\u2026';
    msg.className = 'msg ok';
    const login = await api('POST', '/auth/login', { email, password });
    if (login.ok) {
      const me = await api('GET', '/account/me');
      showDashboard(me.data);
    } else {
      show('#login-view');
    }
  } else {
    msg.textContent = r.data.error || 'Registration failed';
    msg.className = 'msg error';
  }
});

// --- Login ---
$('#login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = $('#login-msg');
  const powStatus = $('#pow-status');
  msg.textContent = '';
  msg.className = 'msg';
  powStatus.classList.add('hidden');

  const email = $('#login-email').value;
  const password = $('#login-password').value;
  let body = { email, password };

  let r = await api('POST', '/auth/login', body);

  if (r.status === 403 && r.data.challenge) {
    powStatus.classList.remove('hidden');
    const ch = r.data.challenge;
    const solution = await solvePoW(ch.nonce, ch.difficulty);
    powStatus.classList.add('hidden');
    body.challengeNonce = ch.nonce;
    body.challengeSolution = solution;
    r = await api('POST', '/auth/login', body);
  }

  if (r.ok) {
    const me = await api('GET', '/account/me');
    showDashboard(me.data);
  } else {
    msg.textContent = r.data.error || 'Login failed';
    msg.className = 'msg error';
  }
});

// --- Dashboard ---
function showDashboard(data) {
  show('#dashboard-view');
  settleBackground();
  if (data) {
    $('#user-email').textContent = data.email || '';
    const gs = $('#gateway-status');
    if (data.gateway === 'configured') {
      gs.textContent = 'connected';
      gs.className = 'status-value online';
    } else {
      gs.textContent = 'not configured';
      gs.className = 'status-value offline';
    }
  }
}

// --- Password change ---
$('#password-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = $('#password-msg');
  msg.textContent = '';
  const form = e.target;
  const r = await api('POST', '/account/password', {
    currentPassword: form.currentPassword.value,
    newPassword: form.newPassword.value,
  });
  if (r.ok) {
    msg.textContent = 'Password changed. Please sign in again.';
    msg.className = 'msg ok';
    form.reset();
    setTimeout(() => { unsettleBackground(); show('#login-view'); }, 1500);
  } else {
    msg.textContent = r.data.error || 'Failed';
    msg.className = 'msg error';
  }
});

// --- Logout ---
$('#logout-btn').addEventListener('click', async () => {
  await api('POST', '/auth/logout');
  document.querySelectorAll('#app form').forEach(f => f.reset());
  unsettleBackground();
  show('#login-view');
});

init();
})();
</script>
</body>
</html>
